# Clash Meta (mihomo) configuration for TProxy
# Конфигурация Clash Meta (mihomo) для TProxy

# TProxy listening port (must match tproxy.sh PROXY_TCP_PORT/PROXY_UDP_PORT)
# Порт TProxy (должен совпадать с PROXY_TCP_PORT/PROXY_UDP_PORT в tproxy.sh)
tproxy-port: 12345

# DNS configuration
# Replace dns.listen port with your DNS_PORT from tproxy.conf
# Замените порт dns.listen на ваш DNS_PORT из tproxy.conf
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/15
  fake-ip-filter:
    - "*"
    - "+.lan"
    - "+.local"
    - "+.market.xiaomi.com"
    - "localhost.ptlogin2.qq.com"
  nameserver:
    - https://120.53.53.53/dns-query
    - https://223.5.5.5/dns-query

proxies:
  - name: "VK_TURN_VLESS"
    type: vless
    server: 127.0.0.1
    port: 9000
    uuid: "YOUR_UUID_FROM_3XUI"
    network: tcp
    udp: true

proxy-groups:
  - name: "PROXY"
    type: select
    proxies:
      - VK_TURN_VLESS
      - DIRECT

rules:
  - DST-PORT,53,DNS_Hijack
  - GEOSITE,category-ru,DIRECT
  - GEOIP,private,DIRECT
  - GEOIP,ru,DIRECT
  - MATCH,PROXY
