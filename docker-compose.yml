services:
    caddy:
        image: caddy:latest
        container_name: caddy
        restart: always
        network_mode: host
        volumes:
            - ./caddy/data:/data
            - ./Caddyfile:/etc/caddy/Caddyfile

    3xui:
        image: ghcr.io/w3struk/3x-ui:fix-json-sub
        container_name: 3xui_app
        restart: unless-stopped
        network_mode: host
        volumes:
            - ./3x-ui/db/:/etc/x-ui/
        environment:
            XRAY_VMESS_AEAD_FORCED: "false"
            XUI_ENABLE_FAIL2BAN: "true"
        tty: true