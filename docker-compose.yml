services:
    caddy:
        image: caddy:latest
        container_name: caddy
        restart: always
        network_mode: host
        volumes:
            - ./caddy/data:/data
            - ./Caddyfile:/etc/caddy/Caddyfile

    3xui:
        image: ghcr.io/w3struk/3x-ui:v3.2.8-xhttp-padding.1@sha256:91b01946a36cd142a39d9aae21eed954d7ccba5905e581a3237ea6626ed4cf7b
        container_name: 3xui_app
        restart: unless-stopped
        network_mode: host
        volumes:
            - ./3x-ui/db/:/etc/x-ui/
            - ./caddy/data/caddy/certificates:/etc/x-ui/certs:ro
        environment:
            XRAY_VMESS_AEAD_FORCED: "false"
            XUI_ENABLE_FAIL2BAN: "true"
        tty: true
